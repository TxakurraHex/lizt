[workspace]
members = [
    "crates/lizt-cli",
    "crates/lizt-core",
    "crates/lizt-cpe",
    "crates/lizt-ebpf",
    "crates/lizt-symbols",
]
resolver = "2"

[workspace.dependencies]
reqwest = { version = "0.12", features = ["blocking", "json"] }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
time = { version = "0.3", features = ["serde", "macros"] }
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio", "time"]}