<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80">
  <!-- No background rect — transparent -->

  <!-- Wings -->
  <ellipse cx="42" cy="18" rx="22" ry="8" fill="#003057" opacity="0.30" transform="rotate(-18 42 18)"/>
  <ellipse cx="60" cy="16" rx="20" ry="7" fill="#003057" opacity="0.22" transform="rotate(-12 60 16)"/>

  <!-- Head -->
  <ellipse cx="28" cy="40" rx="11" ry="9.5" fill="#003057"/>

  <!-- Thorax -->
  <ellipse cx="46" cy="40" rx="13.5" ry="11" fill="#003057"/>
  <rect x="39.5" y="30" width="2" height="20" rx="1" fill="#C9A800" opacity="0.85"/>
  <rect x="44" y="30" width="2" height="20" rx="1" fill="#C9A800" opacity="0.85"/>
  <rect x="48.5" y="30" width="2" height="20" rx="1" fill="#C9A800" opacity="0.85"/>

  <!-- Abdomen -->
  <ellipse cx="63" cy="40" rx="10" ry="9" fill="#003057"/>
  <rect x="58.5" y="32" width="2" height="16" rx="1" fill="#C9A800" opacity="0.85"/>
  <rect x="63" y="32" width="2" height="16" rx="1" fill="#C9A800" opacity="0.85"/>

  <!-- Stinger -->
  <line x1="73" y1="40" x2="87" y2="40" stroke="#003057" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M84 37 L89 40 L84 43" fill="#003057"/>

  <!-- Wordmark — navy for light backgrounds -->
  <text x="104" y="49"
    font-family="ui-monospace, 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace"
    font-size="38" font-weight="700" letter-spacing="3"
    fill="#003057">lizt</text>
</svg>
