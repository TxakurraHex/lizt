    <style>
        :root {
            --bg: #05101a;
            --surface: #0a1e30;
            --border: #163050;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #C9A800;
            --red: #f85149;
            --orange: #d29922;
            --green: #3fb950;
            --purple: #bc8cff;
            --radius: 6px;
            --font: 'Segoe UI', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
        }

        /* ── Layout ── */
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 32px;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 2px;
        }

        nav {
            display: flex;
            gap: 4px;
        }

        nav button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-family: var(--font);
            transition: background .15s, color .15s;
        }

        nav button:hover {
            background: rgba(201, 168, 0, .08);
            color: var(--text);
        }

        nav button.active {
            background: rgba(201, 168, 0, .15);
            color: var(--accent);
            font-weight: 600;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #refresh-btn, .export-dropdown > button {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            cursor: pointer;
            padding: 5px 14px;
            border-radius: var(--radius);
            font-size: 12px;
            font-family: var(--font);
            transition: border-color .15s, color .15s;
        }

        #refresh-btn:hover, .export-dropdown > button:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .export-dropdown {
            position: relative;
        }

        .export-menu {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 4px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            z-index: 20;
            min-width: 140px;
        }

        .export-menu.open {
            display: block;
        }

        .export-menu a {
            display: block;
            padding: 8px 14px;
            color: var(--text);
            text-decoration: none;
            font-size: 12px;
            transition: background .15s;
        }

        .export-menu a:hover {
            background: rgba(201, 168, 0, .12);
            color: var(--accent);
        }

        main {
            flex: 1;
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
        }

        /* ── Tables ── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .7px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02);
        }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-critical {
            background: rgba(248, 81, 73, .15);
            color: #f85149;
        }

        .badge-high {
            background: rgba(210, 153, 34, .15);
            color: #d29922;
        }

        .badge-medium {
            background: rgba(201, 168, 0, .15);
            color: #C9A800;
        }

        .badge-low {
            background: rgba(63, 185, 80, .15);
            color: #3fb950;
        }

        .badge-none {
            background: rgba(139, 148, 158, .1);
            color: #8b949e;
        }

        .badge-called {
            background: rgba(188, 140, 255, .15);
            color: #bc8cff;
        }

        .badge-kev {
            background: rgba(248, 81, 73, .2);
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, .4);
        }

        .badge-green {
            background: rgba(63, 185, 80, .15);
            color: #3fb950;
        }

        /* ── Score bar ── */
        .score-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-bar .val {
            min-width: 36px;
        }

        .bar-track {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            min-width: 60px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* ── CVE link ── */
        .cve-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-family: monospace;
            font-size: 12px;
        }

        .cve-link:hover {
            text-decoration: underline;
        }

        /* ── Detail slide-over ── */
        #detail-panel {
            position: fixed;
            top: 52px;
            right: 0;
            bottom: 0;
            width: 420px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 24px;
            overflow-y: auto;
            z-index: 20;
            transform: translateX(100%);
            transition: transform .2s ease;
        }

        #detail-panel.open {
            transform: translateX(0);
        }

        #detail-panel .close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
        }

        #detail-panel h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--accent);
        }

        #detail-panel p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-item label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 3px;
        }

        .meta-item span {
            font-weight: 600;
        }

        /* ── Symbol rows in detail ── */
        .sym-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .sym-row .sym-name {
            font-family: monospace;
            color: var(--text);
            flex: 1;
            word-break: break-all;
        }

        .sym-row .sym-calls {
            color: var(--purple);
            font-size: 12px;
            white-space: nowrap;
        }

        /* ── Loading / empty ── */
        .state-msg {
            color: var(--muted);
            padding: 40px 0;
            text-align: center;
        }

        /* ── Stat strip ── */
        .stat-strip {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 20px;
            flex: 1;
            min-width: 140px;
        }

        .stat-box .label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .7px;
            margin-bottom: 4px;
        }

        .stat-box .value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-box .value.red {
            color: var(--red);
        }

        .stat-box .value.orange {
            color: var(--orange);
        }

        .stat-box .value.purple {
            color: var(--purple);
        }

        .stat-box .value.green {
            color: var(--green);
        }

        /* ── Search box ── */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .search-row input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 7px 12px;
            font-family: var(--font);
            font-size: 13px;
        }

        .search-row input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* ── Scan tab ── */
        .scan-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
        }

        .scan-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .scan-btn:not(:disabled):hover {
            opacity: .85;
        }

        .stage-bar {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .stage-step {
            flex: 1;
            min-width: 0;
        }

        .stage-step .track {
            height: 4px;
            border-radius: 2px;
            margin-bottom: 6px;
            background: var(--border);
            transition: background .3s;
        }

        .stage-step.done .track {
            background: var(--green);
        }

        .stage-step.active .track {
            background: var(--accent);
        }

        .stage-step.failed .track {
            background: var(--red);
        }

        .stage-step .label {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color .3s;
        }

        .stage-step.done .label {
            color: var(--text);
        }

        .stage-step.active .label {
            color: var(--accent);
        }

        .stage-step.failed .label {
            color: var(--red);
        }

        .stage-detail {
            font-size: 12px;
            color: var(--muted);
            min-height: 18px;
        }
    </style>
</head>

    <script>
        // ─────────────────────────────────────────────
        // State
        // ─────────────────────────────────────────────
        let currentTab = 'findings';
        let cache = {};
        let scanEvtSource = null; // active EventSource, if any
        let pollTimer = null;     // auto-refresh interval for the active tab

        function toggleExportMenu(e) {
            e.stopPropagation();
            document.getElementById('export-menu').classList.toggle('open');
        }
        document.addEventListener('click', () => {
            document.getElementById('export-menu').classList.remove('open');
        });

        // ─────────────────────────────────────────────
        // Routing
        // ─────────────────────────────────────────────
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach((b, i) => {
                const tabs = ['findings', 'observations', 'inventory', 'symbols', 'scan'];
                b.classList.toggle('active', tabs[i] === tab);
            });
            cache = {};
            // Leave the SSE connection open when switching away from Scan —
            // it will close itself on Complete/Failed.
            startPoll(tab);
            reload();
        }

        function startPoll(tab) {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            if (tab === 'findings' || tab === 'observations') {
                pollTimer = setInterval(() => refreshData(), 5000);
            }
        }

        async function refreshData() {
            try {
                if (currentTab === 'findings' && document.getElementById('findings-body')) {
                    cache.findings = await fetchJSON('/api/findings');
                    applyFindingsFilter();
                } else if (currentTab === 'observations' && document.getElementById('obs-body')) {
                    cache.observations = await fetchJSON('/api/observation');
                    applyObsFilter();
                }
            } catch (_) { /* silent — next poll will retry */ }
        }

        function reload() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="state-msg">Loading...</div>';
            if (currentTab === 'findings') renderFindings();
            if (currentTab === 'observations') renderObservations();
            if (currentTab === 'inventory') renderInventory();
            if (currentTab === 'symbols') renderSymbols();

        // ─────────────────────────────────────────────
        // Fetch helpers
        // ─────────────────────────────────────────────
        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
            return res.json();
        }

        function err(msg) {
            document.getElementById('main-content').innerHTML =
                `<div class="state-msg" style="color:var(--red)">Error: ${msg}</div>`;
        }

        // ─────────────────────────────────────────────
        // Helpers
        // ─────────────────────────────────────────────
        function cvssColor(score) {
            if (score == null) return 'none';
            if (score >= 9.0) return 'critical';
            if (score >= 7.0) return 'high';
            if (score >= 4.0) return 'medium';
            return 'low';
        }

        function cvssBarColor(score) {
            if (score == null) return 'var(--muted)';
            if (score >= 9.0) return 'var(--red)';
            if (score >= 7.0) return 'var(--orange)';
            if (score >= 4.0) return 'var(--accent)';
            return 'var(--green)';
        }

        function scoreBar(score) {
            if (score == null) return '<span style="color:var(--muted)">—</span>';
            const pct = Math.round((score / 10) * 100);
            return `<div class="score-bar">
    <span class="val badge badge-${cvssColor(score)}">${score}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cvssBarColor(score)}"></div></div>
  </div>`;
        }

        function rankBadge(r) {
            if (r == null) return '<span class="badge badge-none">unranked</span>';
            const v = parseFloat(r).toFixed(1);
            if (r >= 25) return `<span class="badge badge-critical">${v}</span>`;
            if (r >= 12) return `<span class="badge badge-high">${v}</span>`;
            if (r >= 5) return `<span class="badge badge-medium">${v}</span>`;
            return `<span class="badge badge-low">${v}</span>`;
        }

        function symbolBadge(called, present) {
            if (called) return '<span class="badge badge-called">called</span>';
            if (present) return '<span class="badge badge-medium">present</span>';
            return '<span class="badge badge-none">none</span>';
        }

        function fmtDate(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleString();
        }

        function fmtDuration(startedAt, finishedAt) {
            if (!finishedAt) return '—';
            const ms = new Date(finishedAt) - new Date(startedAt);
            const s = Math.floor(ms / 1000);
            if (s < 60) return `${s}s`;
            const m = Math.floor(s / 60);
            return `${m}m ${s % 60}s`;
        }

        function filterRows(rows, query, fields) {
            if (!query) return rows;
            const q = query.toLowerCase();
            return rows.filter(r => fields.some(f => (r[f] || '').toLowerCase().includes(q)));
        }

                msg.style.color = 'var(--red)';
                msg.textContent = 'All fields are required';

            try {
                const res = await fetch('/api/symbols', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cve_id: cveId, name, binary_path: binaryPath }),
                });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text);
                }
                msg.style.color = 'var(--green)';
                msg.textContent = 'Symbol added';
                document.getElementById('add-cve-id').value = '';

                msg.style.color = 'var(--red)';

        function startScan() {
            const btn = document.getElementById('scan-btn');
            const evalBtn = document.getElementById('eval-btn');
            const fixtureSelect = document.getElementById('fixture-select');
            const fixture = fixtureSelect.value;

            btn.disabled = true;
            evalBtn.disabled = true;
            fixtureSelect.disabled = true;
            btn.textContent = 'Connecting...';

            const tracker = document.getElementById('stage-tracker');
            if (tracker) tracker.style.display = 'block';

            connectScanSSE();

            scanEvtSource.onopen = async () => {
                try {
                    btn.textContent = 'Starting...';
                    const res = await fetch('/api/scan', { method: 'POST' });
                    if (!res.ok) {
                        const msg = res.status === 409 ? 'A scan is already running' : await res.text();
                        throw new Error(msg);
                    }
                    btn.textContent = 'Running...';
                } catch (e) {
                    closeScanEvents();
                    btn.disabled = false;
                    evalBtn.disabled = false;
                    fixture.disabled = false;
                    alert(`Failed to start scan: ${e.message}`);
                }
            };
        }

        function startEval() {
            const btn = document.getElementById('eval-btn');
            const scanBtn = document.getElementById('scan-btn');
            const fixtureSelect = document.getElementById('fixture-select');
            const fixture = fixtureSelect.value;

            btn.disabled = true;
            scanBtn.disabled = true;
            fixtureSelect.disabled = true;
            btn.textContent = 'Connecting...';

            const tracker = document.getElementById('stage-tracker');
            if (tracker) tracker.style.display = 'block';

            connectScanSSE();

            scanEvtSource.onopen = async () => {
                try {
                    btn.textContent = 'Starting...';
                    const res = await fetch('/api/eval', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ fixture }),
                    });
                    if (!res.ok) {
                        const msg = res.status === 409 ? 'A scan is already running' : await res.text();
                        throw new Error(msg);
                    }
                    btn.textContent = 'Running...';
                } catch (e) {
                    closeScanEvents();
                    btn.disabled = false;
                    scanBtn.disabled = false;
                    fixture.disabled = false;
                    btn.textContent = '▶ Run Eval';
                    alert(`Failed to start eval: ${e.message}`);
                }
            }
        }

        function connectScanSSE() {
            if (scanEvtSource) {
                scanEvtSource.close();
                scanEvtSource = null;
            }

            scanEvtSource = new EventSource('/api/scan/events');

            scanEvtSource.onmessage = (e) => {
                const msg = JSON.parse(e.data);

                if (msg.type === 'stage') {
                    const tracker = document.getElementById('stage-tracker');
                    if (tracker) {
                        tracker.style.display = 'block';
                    }
                    setStage(msg.stage, msg.detail);
                }

                if (msg.type === 'complete') {
                    finaliseStages('done');
                    closeScanEvents();
                    fetchJSON('/api/scan').then(scans => {
                        const tbody = document.getElementById('scan-history');
                        if (tbody) {
                            tbody.innerHTML = scans.map(scanRow).join('');
                        }
                    });
                }

                if (msg.type === 'failed') {
                    finaliseStages('failed');
                    closeScanEvents();
                    document.getElementById('stage-detail').textContent = `Error: ${msg.error}`;
                }
            };

            scanEvtSource.onerror = () => {
                if (document.getElementById('scan-btn')?.textContent !== 'Running...') {
                    closeScanEvents();
                }
            }
        }

        async function checkScanStatus() {
            try {
                const status = await fetchJSON('/api/scan/status');
                if (!status.running) {
                    return;
                }

                const btn = document.getElementById('scan-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Running...';
                }
                const tracker = document.getElementById('stage-tracker');
                if (tracker) {
                    tracker.style.display = 'block';
                }

                if (status.stage) {
                    setStage(status.stage, status.detail || '');
                }

                connectScanSSE();
            } catch (e) {
                console.warn('Scan status check failed: ', e);
            }
        }

        function closeScanEvents() {
            if (scanEvtSource) {
                scanEvtSource.close();
                scanEvtSource = null;
            }
            const scanBtn = document.getElementById('scan-btn');
            if (scanBtn) {
                scanBtn.disabled = false;
                scanBtn.textContent = '▶ Run Scan';
            }

            const evalBtn = document.getElementById('eval-btn');
            if (evalBtn) {
                evalBtn.disabled = false;
                evalBtn.textContent = '▶ Run Eval';
            }
        }

        function setStage(stageKey, detail) {
            const idx = SCAN_STAGES.findIndex(s => s.key === stageKey);

            SCAN_STAGES.forEach((s, i) => {
                const el = document.getElementById(`step-${s.key}`);
                if (!el) return;
                el.className = 'stage-step ' + (i < idx ? 'done' : i === idx ? 'active' : '');
            });

            const detailEl = document.getElementById('stage-detail');
            if (detailEl) detailEl.textContent = detail;
        }

        function finaliseStages(outcome) {
            // outcome: 'done' | 'failed'
            SCAN_STAGES.forEach(s => {
                const el = document.getElementById(`step-${s.key}`);
                if (!el) return;
                el.className = `stage-step ${outcome === 'failed' && el.classList.contains('active') ? 'failed' : 'done'}`;
            });
        }

        // ─────────────────────────────────────────────
        // Boot
        // ─────────────────────────────────────────────
        startPoll(currentTab);
        reload();
    </script>
</body>

</html>
