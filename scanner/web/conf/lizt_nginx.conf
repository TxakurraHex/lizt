# /etc/nginx/sites-available/lizt
#
# Prerequisites:
#   1. Generate self-signed cert:
#       sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#           -keyout /etc/nginx/ssl/lizt.key \
#           -out /etc/nginx/ssl/lizt.crt \
#           -subj "/CN=lizt-dashboard"
#
#   2. Create htpasswd file:
#       sudo apt install apache2-utils
#       sudo htpasswd -c /etc/nginx/.lizt_htpasswd <username>
#
#   3. Enable the site:
#       sudo ln -s /etc/nginx/sites-available/lizt /etc/nginx/sites-enabled/lizt
#       sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # -- TLS --
    ssl_certificate /etc/nginx/ssl/lizt.crt;
    ssl_certificate_key /etc/nginx/ssl/lizt.key;

    # -- Modern TLS --
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # -- Auth --
    auth_basic "lizt Dashboard";
    auth_basic_user_file /etc/nginx/.lizt_htpasswd;

    # -- Proxy --
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass real client IP through
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
    }
}