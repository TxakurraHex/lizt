refresh_rate: 30 seconds
appenders:
  console:
    kind: console
    encoder:
      pattern: "{h({d(%Y-%m-%d %H:%M:%S %Z)(utc)} [{l}] {t} - {m})}{n}"
  rolling_file:
    kind: rolling_file
    path: logs/lizt_monitor.log
    encoder:
      pattern: "{h({d(%Y-%m-%d %H:%M:%S %Z)(utc)} [{l}] {t} - {m})}{n}"
    policy:
      kind: compound
      trigger:
        kind: time
        interval: 1 day
      roller:
        kind: fixed_window
        pattern: logs/lizt_monitor.{}.log.gz
        base: 1
        count: 8

root:
  level: warn
  appenders:
    - console
    - rolling_file

loggers:
  lizt_ebpf:
    level: debug
    additive: false
    appenders:
      - console
      - rolling_file