<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVE Pipeline Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #161b24;
    --border: #1e2530;
    --border2: #263040;
    --text: #c9d1e0;
    --text-dim: #5a6880;
    --text-bright: #e8edf5;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --critical: #ff3366;
    --high: #ff7733;
    --medium: #ffcc00;
    --low: #33cc66;
    --unknown: #6688aa;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* Scan line effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    box-shadow: 0 0 12px rgba(0,212,255,0.2);
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: -0.02em;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px;
  }

  /* Upload zone */
  #upload-zone {
    border: 1px dashed var(--border2);
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg2);
    margin-bottom: 32px;
  }
  #upload-zone:hover, #upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(0,212,255,0.03);
    box-shadow: 0 0 30px rgba(0,212,255,0.08);
  }
  #upload-zone h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  #upload-zone p {
    color: var(--text-dim);
    font-size: 14px;
  }
  #upload-zone .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }
  #file-input { display: none; }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.total::before { background: var(--accent); }
  .stat-card.critical::before { background: var(--critical); }
  .stat-card.high::before { background: var(--high); }
  .stat-card.medium::before { background: var(--medium); }
  .stat-card.low::before { background: var(--low); }
  .stat-card.affected::before { background: #aa66ff; }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-bright);
    font-family: var(--mono);
    line-height: 1;
  }

  .stat-card.critical .stat-value { color: var(--critical); }
  .stat-card.high .stat-value { color: var(--high); }
  .stat-card.medium .stat-value { color: var(--medium); }
  .stat-card.low .stat-value { color: var(--low); }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  input[type="text"], select {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="text"] { width: 280px; }

  select option { background: var(--bg3); }

  .ctrl-label {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* Results table */
  .results-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
    font-family: var(--mono);
  }

  .section-count {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* Package rows */
  .pkg-row {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  .pkg-row:last-child { border-bottom: none; }
  .pkg-row:hover { background: rgba(255,255,255,0.02); }

  .pkg-summary {
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 100px 80px 24px;
    gap: 16px;
    align-items: center;
  }

  .pkg-name {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-bright);
    font-weight: 500;
  }

  .pkg-version {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .pkg-source {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    background: var(--bg3);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .cve-badges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }
  .badge.CRITICAL { background: rgba(255,51,102,0.15); color: var(--critical); border: 1px solid rgba(255,51,102,0.3); }
  .badge.HIGH { background: rgba(255,119,51,0.15); color: var(--high); border: 1px solid rgba(255,119,51,0.3); }
  .badge.MEDIUM { background: rgba(255,204,0,0.1); color: var(--medium); border: 1px solid rgba(255,204,0,0.25); }
  .badge.LOW { background: rgba(51,204,102,0.1); color: var(--low); border: 1px solid rgba(51,204,102,0.25); }
  .badge.UNKNOWN { background: rgba(102,136,170,0.1); color: var(--unknown); border: 1px solid rgba(102,136,170,0.25); }
  .badge.none { background: rgba(255,255,255,0.03); color: var(--text-dim); border: 1px solid var(--border); }

  .chevron {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.2s;
    font-family: var(--mono);
  }
  .pkg-row.open .chevron { transform: rotate(90deg); }

  /* CVE detail panel */
  .cve-panel {
    display: none;
    padding: 0 20px 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg3);
  }
  .pkg-row.open .cve-panel { display: block; }

  .cpe-info {
    padding: 12px 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .cpe-info span { color: var(--accent); }

  .cve-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .cve-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    border-left: 3px solid var(--border);
  }
  .cve-item.CRITICAL { border-left-color: var(--critical); }
  .cve-item.HIGH { border-left-color: var(--high); }
  .cve-item.MEDIUM { border-left-color: var(--medium); }
  .cve-item.LOW { border-left-color: var(--low); }

  .cve-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .cve-id {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .cve-score {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
  }
  .CRITICAL .cve-score { color: var(--critical); }
  .HIGH .cve-score { color: var(--high); }
  .MEDIUM .cve-score { color: var(--medium); }
  .LOW .cve-score { color: var(--low); }

  .cve-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .cve-desc {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .cve-refs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .cve-refs a {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent2);
    text-decoration: none;
    background: rgba(0,153,204,0.08);
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid rgba(0,153,204,0.2);
  }
  .cve-refs a:hover { color: var(--accent); border-color: var(--accent); }

  .no-cves {
    padding: 12px 0;
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  /* Empty state */
  #results { display: none; }
  #empty-state { text-align: center; padding: 80px 20px; color: var(--text-dim); }

  /* Pagination */
  .pagination {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 24px;
    align-items: center;
  }
  .pagination button {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 14px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    transition: all 0.15s;
  }
  .pagination button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pagination button:disabled { opacity: 0.3; cursor: default; }
  .pagination button.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
  .pagination .page-info { font-family: var(--mono); font-size: 12px; color: var(--text-dim); padding: 8px 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">CVE Pipeline</div>
      <div class="logo-sub">Vulnerability Report Viewer</div>
    </div>
  </div>
  <div class="header-meta" id="scan-meta">Load a results JSON to begin</div>
</header>

<main>
  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="icon">📂</div>
    <h2>Drop cve_results.json here</h2>
    <p>Or click to browse — output file from <code>python pipeline.py</code></p>
    <input type="file" id="file-input" accept=".json">
  </div>

  <div id="results">
    <div class="summary-grid" id="summary-grid"></div>

    <div class="controls">
      <span class="ctrl-label">Filter:</span>
      <input type="text" id="search" placeholder="Search package name...">
      <select id="severity-filter">
        <option value="">All severities</option>
        <option value="CRITICAL">Critical only</option>
        <option value="HIGH">High+</option>
        <option value="MEDIUM">Medium+</option>
        <option value="LOW">Low+</option>
        <option value="none">No CVEs</option>
      </select>
      <select id="source-filter">
        <option value="">All sources</option>
      </select>
      <select id="sort-by">
        <option value="severity">Sort by severity</option>
        <option value="name">Sort by name</option>
        <option value="cve-count">Sort by CVE count</option>
      </select>
    </div>

    <div class="results-section">
      <div class="section-header">
        <span class="section-title">// INVENTORY_RESULTS</span>
        <span class="section-count" id="shown-count"></span>
      </div>
      <div id="pkg-list"></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <div id="empty-state">
    <div style="font-size:48px;margin-bottom:16px;">🔍</div>
    <div style="font-size:16px;color:var(--text-dim)">No results match the current filters</div>
  </div>
</main>

<script>
let allData = null;
let filtered = [];
let page = 0;
const PAGE_SIZE = 50;

// --- File loading ---
const uploadZone = document.getElementById('upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      allData = data;
      uploadZone.style.display = 'none';
      document.getElementById('results').style.display = 'block';
      render(data);
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function render(data) {
  // Summary
  const s = data.summary || {};
  const summaryGrid = document.getElementById('summary-grid');
  summaryGrid.innerHTML = `
    <div class="stat-card total"><div class="stat-label">Total Scanned</div><div class="stat-value">${s.total_items || 0}</div></div>
    <div class="stat-card affected"><div class="stat-label">Affected</div><div class="stat-value">${s.items_with_cves || 0}</div></div>
    <div class="stat-card critical"><div class="stat-label">Critical</div><div class="stat-value">${s.critical || 0}</div></div>
    <div class="stat-card high"><div class="stat-label">High</div><div class="stat-value">${s.high || 0}</div></div>
    <div class="stat-card medium"><div class="stat-label">Medium</div><div class="stat-value">${s.medium || 0}</div></div>
    <div class="stat-card low"><div class="stat-label">Low</div><div class="stat-value">${s.low || 0}</div></div>
  `;

  document.getElementById('scan-meta').textContent = `${s.total_items} items · ${s.total_cves} CVEs`;

  // Populate source filter
  const sources = [...new Set((data.results || []).map(r => r.item?.source).filter(Boolean))];
  const sf = document.getElementById('source-filter');
  sources.forEach(src => {
    const opt = document.createElement('option');
    opt.value = src;
    opt.textContent = src;
    sf.appendChild(opt);
  });

  applyFilters();
}

function severityScore(cves) {
  const order = { CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1, UNKNOWN: 0 };
  return Math.max(0, ...cves.map(c => order[c.severity] || 0));
}

function applyFilters() {
  if (!allData) return;
  const search = document.getElementById('search').value.toLowerCase();
  const sevFilter = document.getElementById('severity-filter').value;
  const srcFilter = document.getElementById('source-filter').value;
  const sortBy = document.getElementById('sort-by').value;

  const sevOrder = { CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1, UNKNOWN: 0 };

  filtered = (allData.results || []).filter(r => {
    const item = r.item || {};
    if (search && !item.product?.toLowerCase().includes(search)) return false;
    if (srcFilter && item.source !== srcFilter) return false;

    if (sevFilter === 'none') return r.cves.length === 0;
    if (sevFilter) {
      const threshold = sevOrder[sevFilter] || 0;
      const max = Math.max(0, ...r.cves.map(c => sevOrder[c.severity] || 0));
      if (max < threshold) return false;
    }
    return true;
  });

  // Sort
  if (sortBy === 'severity') {
    filtered.sort((a, b) => severityScore(b.cves) - severityScore(a.cves));
  } else if (sortBy === 'name') {
    filtered.sort((a, b) => (a.item?.product || '').localeCompare(b.item?.product || ''));
  } else if (sortBy === 'cve-count') {
    filtered.sort((a, b) => b.cves.length - a.cves.length);
  }

  page = 0;
  renderList();
}

function renderList() {
  const list = document.getElementById('pkg-list');
  const emptyState = document.getElementById('empty-state');
  const shownCount = document.getElementById('shown-count');

  if (filtered.length === 0) {
    list.innerHTML = '';
    emptyState.style.display = 'block';
    document.getElementById('pagination').innerHTML = '';
    shownCount.textContent = '0 results';
    return;
  }

  emptyState.style.display = 'none';
  const start = page * PAGE_SIZE;
  const end = Math.min(start + PAGE_SIZE, filtered.length);
  const pageItems = filtered.slice(start, end);

  shownCount.textContent = `${filtered.length} results · page ${page+1}/${Math.ceil(filtered.length/PAGE_SIZE)}`;

  list.innerHTML = pageItems.map((r, i) => renderRow(r, i)).join('');

  // Attach click handlers
  list.querySelectorAll('.pkg-summary').forEach(el => {
    el.addEventListener('click', () => {
      el.closest('.pkg-row').classList.toggle('open');
    });
  });

  renderPagination();
}

function renderRow(r, i) {
  const item = r.item || {};
  const cves = r.cves || [];

  // Count by severity
  const counts = {};
  cves.forEach(c => counts[c.severity] = (counts[c.severity] || 0) + 1);

  const badges = Object.entries(counts)
    .sort((a,b) => ({CRITICAL:4,HIGH:3,MEDIUM:2,LOW:1,UNKNOWN:0}[b[0]] - ({CRITICAL:4,HIGH:3,MEDIUM:2,LOW:1,UNKNOWN:0}[a[0]])))
    .map(([sev, cnt]) => `<span class="badge ${sev}">${sev[0]}:${cnt}</span>`)
    .join('') || '<span class="badge none">clean</span>';

  const cveItems = cves.map(c => `
    <div class="cve-item ${c.severity}">
      <div class="cve-header">
        <span class="cve-id">${c.cve_id}</span>
        <span class="badge ${c.severity}">${c.severity}</span>
        <span class="cve-score">${c.cvss_score.toFixed(1)}</span>
        <span class="cve-date">${c.published?.split('T')[0] || ''}</span>
      </div>
      <div class="cve-desc">${escapeHtml(c.description)}</div>
      <div class="cve-refs">
        ${(c.references || []).map(url => `<a href="${url}" target="_blank" rel="noopener">${shortUrl(url)}</a>`).join('')}
      </div>
    </div>
  `).join('');

  const cpeMatches = (r.matched_cpes || []).map(c => c.cpe_name).join(', ') || item.cpe_guess || '—';

  return `
    <div class="pkg-row">
      <div class="pkg-summary">
        <span class="pkg-name">${escapeHtml(item.product || '?')}</span>
        <span class="pkg-version">${escapeHtml(item.version || '?')}</span>
        <span class="pkg-source">${escapeHtml(item.source || '?')}</span>
        <div class="cve-badges">${badges}</div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${cves.length} CVE${cves.length !== 1 ? 's' : ''}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="cve-panel">
        <div class="cpe-info">CPE: <span>${escapeHtml(cpeMatches)}</span></div>
        <div class="cve-list">
          ${cveItems || `<div class="no-cves">// no vulnerabilities found</div>`}
        </div>
      </div>
    </div>
  `;
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button onclick="goPage(${page-1})" ${page===0?'disabled':''}>← Prev</button>`;
  for (let i = 0; i < total; i++) {
    if (i === 0 || i === total-1 || Math.abs(i - page) <= 2) {
      html += `<button class="${i===page?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
    } else if (Math.abs(i - page) === 3) {
      html += `<span class="page-info">…</span>`;
    }
  }
  html += `<button onclick="goPage(${page+1})" ${page===total-1?'disabled':''}>Next →</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(n) {
  page = n;
  renderList();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function shortUrl(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch { return url.slice(0,30); }
}

['search','severity-filter','source-filter','sort-by'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
  if (id === 'search') document.getElementById(id).addEventListener('input', applyFilters);
});
</script>
